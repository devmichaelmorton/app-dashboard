<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Apps</title>
  <style>
    :root {
      --bg: #0b0f17;
      --bg-grad-1: #131a29;
      --card: #161c2b;
      --card-hover: #1d2740;
      --border: #262f45;
      --text: #e7ecf5;
      --muted: #8a95ab;
      --accent: #6ea8fe;
      --accent-soft: rgba(110, 168, 254, 0.14);
      --ok: #4ade80;
      --ok-soft: rgba(74, 222, 128, 0.14);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, var(--bg-grad-1), var(--bg)) fixed;
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 56px 24px 80px; }
    header { margin-bottom: 36px; }
    h1 { font-size: 30px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 6px; }
    .subtitle { color: var(--muted); font-size: 15px; margin: 0; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }
    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.14s ease, background 0.14s ease, border-color 0.14s ease;
      overflow: hidden;
    }
    .card:hover {
      background: var(--card-hover);
      border-color: var(--accent);
      transform: translateY(-3px);
    }
    .icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      background: var(--accent-soft);
      margin-bottom: 14px;
    }
    .card h2 { font-size: 17px; font-weight: 650; margin: 0 0 4px; letter-spacing: -0.01em; }
    .card p { font-size: 13.5px; color: var(--muted); margin: 0; line-height: 1.45; flex: 1; }
    .meta {
      display: flex; align-items: center; gap: 8px;
      margin-top: 16px;
    }
    .badge {
      font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
      padding: 3px 8px; border-radius: 999px;
    }
    .badge.live { background: var(--ok-soft); color: var(--ok); }
    .badge.repo { background: var(--accent-soft); color: var(--accent); }
    .arrow { margin-left: auto; color: var(--muted); font-size: 18px; transition: transform 0.14s ease, color 0.14s ease; }
    .card:hover .arrow { transform: translateX(3px); color: var(--accent); }
    .repolink {
      position: absolute; top: 16px; right: 16px;
      font-size: 12px; color: var(--muted);
      text-decoration: none; z-index: 2;
      padding: 4px 6px; border-radius: 8px;
      opacity: 0; transition: opacity 0.14s ease, background 0.14s ease;
    }
    .card:hover .repolink { opacity: 1; }
    .repolink:hover { background: rgba(255,255,255,0.06); color: var(--text); }
    .section { margin-bottom: 40px; }
    .section-title {
      display: flex; align-items: baseline; gap: 10px;
      font-size: 13px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--muted);
      margin: 0 0 16px; padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .section-title .count { font-weight: 500; letter-spacing: 0; text-transform: none; opacity: 0.7; }
    footer { margin-top: 44px; color: var(--muted); font-size: 12.5px; }
    footer a { color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>My Apps</h1>
      <p class="subtitle">Quick launcher for my projects.</p>
    </header>

    <div class="grid" id="grid"></div>

    <footer>
      Hosted on GitHub Pages · <a href="https://github.com/devmichaelmorton" target="_blank" rel="noopener">github.com/devmichaelmorton</a>
    </footer>
  </div>

  <script>
    // Edit this list to add / remove apps.
    // Repos are private on github.com/devmichaelmorton.
    // Add `site:` when an app is deployed & public — the card then opens the live app
    // and shows a green check. Without `site`, the card opens the GitHub repo.
    const gh = (r) => "https://github.com/devmichaelmorton/" + r;
    const apps = [
      { name: "AnnoTag",              icon: "🏷️", repo: gh("annotag"),               site: "https://annotag.io",                          desc: "Tag any web page and re-find your notes — Chrome extension + annotag.io + accounts API." },
      { name: "Atelier",              icon: "✍️", repo: gh("atelier"),                                                                    desc: "Distraction-free novel-writing app — scenes, chapters, and worldbuilding." },
      { name: "blueForge",            icon: "🔷", repo: gh("blueForge"),             site: "https://blue-forge-sepia.vercel.app",         desc: "Tailwind-built landing / marketing site." },
      { name: "Compass",              icon: "🧭", repo: gh("compass"),                                                                    desc: "Master productivity app organized by Who / What / Where / When / Why / How." },
      { name: "Contractor Calculator",icon: "🧮", repo: gh("contractor-calculator"), site: "https://contractor-calculator-gamma.vercel.app", desc: "Compare W-2 vs. contractor take-home pay." },
      { name: "emagic",               icon: "✨", repo: gh("emagic"),                                                                     desc: "Emagic marketing site." },
      { name: "Expense Manager",      icon: "💵", repo: gh("expense-manager"),       desc: "Spreadsheet-style expense tracker split by business entity." },
      { name: "Flecks Capital",       icon: "💹", repo: gh("flecks-capital"),        desc: "Gap-trading research & strategy dashboard." },
      { name: "Gap Bot",              icon: "🤖", repo: gh("gap-bot"),               desc: "Python engine researching the gap-fill options edge on SPY / QQQ." },
      { name: "GigaHuman",            icon: "🌱", repo: gh("gigahuman"),             desc: "Life-inventory app scoring every area of your life 1–10." },
      { name: "MBA Library",          icon: "🎓", repo: gh("mba-library"),           desc: "Personal reference library of MBA frameworks, organized by class." },
      { name: "Mortonomics",          icon: "📊", repo: gh("mortonomics"),           site: "https://mortonomics.vercel.app",              desc: "Mortonomics — personal site." },
      { name: "PEG Ratio Comparison", icon: "📈", repo: gh("peg-ratio-calculator"),  site: "https://peg-ratio-calculator-phi.vercel.app", desc: "Compare whether stocks' growth justifies their P/E." },
      { name: "Recipe Manager",       icon: "🍳", repo: gh("recipe-manager"),        desc: "Save and organize recipes, seeded from a Notion export." },
      { name: "Scripture Study",      icon: "📖", repo: gh("scripture-study"),       desc: "Scripture study + worldbuilder for the Standard Works." },
      { name: "Utah Characters",      icon: "🎭", repo: gh("utahcharacters"),        desc: "Utah Characters — site with a PHP contact form." },
    ].map(a => ({ ...a, url: a.site || a.repo, live: !!a.site }));

    const grid = document.getElementById("grid");
    for (const app of apps) {
      const card = document.createElement("a");
      card.className = "card";
      card.href = app.url;
      card.target = "_blank";
      card.rel = "noopener";
      card.innerHTML = `
        ${app.live ? `<a class="repolink" href="${app.repo}" target="_blank" rel="noopener" title="View source">&lt;/&gt; code</a>` : ""}
        <div class="icon">${app.icon}</div>
        <h2>${app.name}</h2>
        <p>${app.desc}</p>
        <div class="meta">
          <span class="badge ${app.live ? "live" : "repo"}">${app.live ? "✓ Live" : "GitHub"}</span>
          <span class="arrow">&rarr;</span>
        </div>
      `;
      grid.appendChild(card);
    }
  </script>
</body>
</html>
