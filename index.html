<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Apps</title>
  <style>
    :root {
      --bg: #0b0f17;
      --bg-grad-1: #131a29;
      --card: #161c2b;
      --card-hover: #1d2740;
      --border: #262f45;
      --text: #e7ecf5;
      --muted: #8a95ab;
      --accent: #6ea8fe;
      --accent-soft: rgba(110, 168, 254, 0.14);
      --ok: #4ade80;
      --ok-soft: rgba(74, 222, 128, 0.14);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, var(--bg-grad-1), var(--bg)) fixed;
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 56px 24px 80px; }
    header { margin-bottom: 36px; }
    h1 { font-size: 30px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 6px; }
    .subtitle { color: var(--muted); font-size: 15px; margin: 0; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }
    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.14s ease, background 0.14s ease, border-color 0.14s ease;
      overflow: hidden;
    }
    .card:hover {
      background: var(--card-hover);
      border-color: var(--accent);
      transform: translateY(-3px);
    }
    .icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      background: var(--accent-soft);
      margin-bottom: 14px;
    }
    .card h2 { font-size: 17px; font-weight: 650; margin: 0 0 4px; letter-spacing: -0.01em; }
    .card p { font-size: 13.5px; color: var(--muted); margin: 0; line-height: 1.45; flex: 1; }
    .meta {
      display: flex; align-items: center; gap: 8px;
      margin-top: 16px;
    }
    .badge {
      font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
      padding: 3px 8px; border-radius: 999px;
    }
    .badge.live { background: var(--ok-soft); color: var(--ok); }
    .badge.repo { background: var(--accent-soft); color: var(--accent); }
    .arrow { margin-left: auto; color: var(--muted); font-size: 18px; transition: transform 0.14s ease, color 0.14s ease; }
    .card:hover .arrow { transform: translateX(3px); color: var(--accent); }
    .repolink {
      position: absolute; top: 16px; right: 16px;
      font-size: 12px; color: var(--muted);
      text-decoration: none; z-index: 2;
      padding: 4px 6px; border-radius: 8px;
      opacity: 0; transition: opacity 0.14s ease, background 0.14s ease;
    }
    .card:hover .repolink { opacity: 1; }
    .repolink:hover { background: rgba(255,255,255,0.06); color: var(--text); }
    footer { margin-top: 44px; color: var(--muted); font-size: 12.5px; }
    footer a { color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>My Apps</h1>
      <p class="subtitle">Quick launcher for my projects.</p>
    </header>

    <div class="grid" id="grid"></div>

    <footer>
      Hosted on GitHub Pages · <a href="https://github.com/devmichaelmorton" target="_blank" rel="noopener">github.com/devmichaelmorton</a>
    </footer>
  </div>

  <script>
    // Edit this list to add / remove apps.
    const apps = [
      {
        name: "PEG Ratio Calculator",
        desc: "Estimate whether a stock's growth justifies its P/E.",
        icon: "📈",
        url: "https://devmichaelmorton.github.io/peg-ratio-calculator/",
        repo: "https://github.com/devmichaelmorton/peg-ratio-calculator",
        live: true
      },
      {
        name: "Contractor Calculator",
        desc: "Compare W-2 vs. contractor take-home pay.",
        icon: "🧮",
        url: "https://devmichaelmorton.github.io/contractor-calculator/",
        repo: "https://github.com/devmichaelmorton/contractor-calculator",
        live: true
      },
      {
        name: "Recipe Manager",
        desc: "Save and organize recipes. (Private repo)",
        icon: "🍳",
        url: "https://github.com/devmichaelmorton/recipe-manager",
        repo: "https://github.com/devmichaelmorton/recipe-manager",
        live: false
      },
      {
        name: "Flecks Trading Dashboard",
        desc: "Trading dashboard project. (Private repo)",
        icon: "💹",
        url: "https://github.com/devmichaelmorton/flecks-trading-dashboard",
        repo: "https://github.com/devmichaelmorton/flecks-trading-dashboard",
        live: false
      }
    ];

    const grid = document.getElementById("grid");
    for (const app of apps) {
      const card = document.createElement("a");
      card.className = "card";
      card.href = app.url;
      card.target = "_blank";
      card.rel = "noopener";
      card.innerHTML = `
        ${app.live ? `<a class="repolink" href="${app.repo}" target="_blank" rel="noopener" title="View source">&lt;/&gt; code</a>` : ""}
        <div class="icon">${app.icon}</div>
        <h2>${app.name}</h2>
        <p>${app.desc}</p>
        <div class="meta">
          <span class="badge ${app.live ? "live" : "repo"}">${app.live ? "Live" : "GitHub"}</span>
          <span class="arrow">&rarr;</span>
        </div>
      `;
      grid.appendChild(card);
    }
  </script>
</body>
</html>
