<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Apps</title>
  <style>
    :root {
      --bg: #0a0e16;
      --bg-grad-1: #141c2e;
      --card: #151b29;
      --card-hover: #1b2438;
      --border: #262f45;
      --text: #e7ecf5;
      --muted: #8a95ab;
      --faint: #5b6478;
      --accent: #6ea8fe;
      --accent-soft: rgba(110, 168, 254, 0.14);
      --ok: #4ade80;
      --ok-soft: rgba(74, 222, 128, 0.13);
      --amber: #fbbf24;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(900px 500px at 12% -8%, rgba(110,168,254,0.10), transparent 60%),
        radial-gradient(900px 500px at 100% 0%, rgba(74,222,128,0.07), transparent 55%),
        radial-gradient(1200px 700px at 50% -10%, var(--bg-grad-1), var(--bg)) fixed;
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 1000px; margin: 0 auto; padding: 56px 24px 90px; }

    header { margin-bottom: 40px; }
    h1 { font-size: 32px; font-weight: 750; letter-spacing: -0.025em; margin: 0 0 8px; }
    .subtitle { color: var(--muted); font-size: 15px; margin: 0 0 18px; }
    .stats { display: flex; gap: 18px; font-size: 13px; color: var(--muted); }
    .stats b { color: var(--text); font-weight: 650; }
    .stats .pip {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--ok); margin-right: 6px; vertical-align: middle;
      box-shadow: 0 0 0 0 rgba(74,222,128,0.6); animation: pulse 2.4s infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(74,222,128,0.55); }
      70%  { box-shadow: 0 0 0 7px rgba(74,222,128,0); }
      100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
    }

    /* sections */
    .section { margin-bottom: 42px; }
    .section-head {
      display: flex; align-items: center; gap: 10px;
      margin: 0 0 18px; padding-bottom: 11px;
      border-bottom: 1px solid var(--border);
    }
    .section-head .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
    .section-head h2 {
      font-size: 12.5px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.09em; margin: 0; color: var(--text);
    }
    .section-head .count {
      font-size: 12px; color: var(--faint); font-weight: 600;
      background: rgba(255,255,255,0.04); padding: 1px 8px; border-radius: 999px;
    }
    .section-head .hint { margin-left: auto; font-size: 12px; color: var(--faint); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 16px;
    }

    /* cards */
    .card {
      position: relative;
      display: flex; flex-direction: column;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      text-decoration: none; color: inherit;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
      overflow: hidden;
    }
    .card::before {
      content: ""; position: absolute; inset: 0 0 auto 0; height: 2px;
      background: transparent; transition: background 0.15s ease;
    }
    .card:hover { background: var(--card-hover); transform: translateY(-3px); }
    .card:not(.live):hover { border-color: var(--accent); }
    .card:not(.live):hover::before { background: linear-gradient(90deg, transparent, var(--accent), transparent); }

    /* live cards get a persistent green identity */
    .card.live { border-color: rgba(74,222,128,0.28); }
    .card.live::before { background: linear-gradient(90deg, transparent, rgba(74,222,128,0.7), transparent); }
    .card.live:hover { border-color: var(--ok); box-shadow: 0 8px 30px -12px rgba(74,222,128,0.35); }

    .icon {
      width: 46px; height: 46px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 23px; background: var(--accent-soft); margin-bottom: 14px;
    }
    .card.live .icon { background: var(--ok-soft); }

    .card h3 { font-size: 17px; font-weight: 650; margin: 0 0 4px; letter-spacing: -0.01em; }
    .card p { font-size: 13.5px; color: var(--muted); margin: 0; line-height: 1.45; flex: 1; }

    .meta { display: flex; align-items: center; gap: 8px; margin-top: 16px; }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 650; letter-spacing: 0.02em;
      padding: 3px 9px; border-radius: 999px;
    }
    .badge.live { background: var(--ok-soft); color: var(--ok); }
    .badge.repo { background: rgba(255,255,255,0.05); color: var(--muted); }
    .badge .live-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--ok);
      box-shadow: 0 0 0 0 rgba(74,222,128,0.6); animation: pulse 2.4s infinite;
    }
    .arrow { margin-left: auto; color: var(--faint); font-size: 18px; transition: transform 0.15s ease, color 0.15s ease; }
    .card:hover .arrow { transform: translateX(3px); }
    .card.live:hover .arrow { color: var(--ok); }
    .card:not(.live):hover .arrow { color: var(--accent); }

    .repolink {
      position: absolute; top: 15px; right: 15px;
      font-size: 11.5px; color: var(--faint); text-decoration: none; z-index: 2;
      padding: 4px 7px; border-radius: 8px;
      opacity: 0; transition: opacity 0.15s ease, background 0.15s ease, color 0.15s ease;
    }
    .card:hover .repolink { opacity: 1; }
    .repolink:hover { background: rgba(255,255,255,0.07); color: var(--text); }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .chip {
      font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 6px;
      background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border);
    }
    .chip.db   { color: #fbbf24; border-color: rgba(251,191,36,0.30); background: rgba(251,191,36,0.08); }
    .chip.host { color: var(--accent); border-color: rgba(110,168,254,0.30); background: var(--accent-soft); }
    .note { font-size: 12px; color: var(--faint); margin-top: 10px; line-height: 1.4; }
    .badge.st-live         { background: var(--ok-soft); color: var(--ok); }
    .badge.st-ready        { background: var(--accent-soft); color: var(--accent); }
    .badge.st-needs-db     { background: rgba(251,191,36,0.12); color: #fbbf24; }
    .badge.st-needs-rework { background: rgba(248,113,113,0.12); color: #f87171; }
    .badge.st-not-web      { background: rgba(255,255,255,0.05); color: var(--muted); }

    .controls { display: flex; gap: 10px; align-items: center; margin-top: 16px; flex-wrap: wrap; }
    .toggle { display: inline-flex; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 3px; gap: 2px; }
    .toggle button {
      background: none; border: none; color: var(--muted); font: inherit;
      font-size: 13px; font-weight: 500; padding: 6px 13px; border-radius: 7px; cursor: pointer;
    }
    .toggle button.active { background: var(--accent-soft); color: var(--accent); }
    .search {
      flex: 1; min-width: 200px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 11px 14px;
      color: var(--text); font-size: 14.5px; outline: none;
      transition: border-color 0.15s ease;
    }
    .search::placeholder { color: var(--faint); }
    .search:focus { border-color: var(--accent); }
    .empty { color: var(--faint); font-size: 14px; padding: 20px 2px; }
    .chip.svc { color: #c084fc; border-color: rgba(192,132,252,0.30); background: rgba(192,132,252,0.08); }
    .bom {
      display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px;
      padding-top: 10px; border-top: 1px solid var(--border);
      font-size: 11.5px; color: var(--faint);
    }
    .bom b { color: var(--muted); font-weight: 500; }
    footer { margin-top: 50px; color: var(--faint); font-size: 12.5px; }
    footer a { color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>My Apps</h1>
      <p class="subtitle">Launcher &amp; command center — every project, its status and stack.</p>
      <div class="stats">
        <span><span class="pip"></span><b id="liveCount">0</b> live</span>
        <span><b id="totalCount">0</b> total</span>
      </div>
      <div class="controls">
        <div class="toggle" id="groupToggle">
          <button data-mode="status" class="active">By status</button>
          <button data-mode="system">By system</button>
        </div>
        <input id="search" class="search" type="search" placeholder="Search apps, stacks, owners…" autocomplete="off" />
      </div>
    </header>

    <div id="sections"></div>

    <footer>
      Hosted on GitHub Pages · <a href="https://github.com/devmichaelmorton" target="_blank" rel="noopener">github.com/devmichaelmorton</a>
    </footer>
  </div>

  <script>
    // Everything comes from apps.json (single source of truth). Each app is a
    // "container card" with a bill of materials. Group By status OR By system.
    const STATUS = {
      "live":         { title: "Live",            color: "#4ade80", hint: "deployed & working" },
      "ready":        { title: "Ready to deploy", color: "#6ea8fe", hint: "will work — just ship it" },
      "needs-db":     { title: "Needs a database",color: "#fbbf24", hint: "deploys, but needs hosted Postgres" },
      "needs-rework": { title: "Needs rework",    color: "#f87171", hint: "architecture change to host" },
      "not-web":      { title: "Not a web app",   color: "#8a95ab", hint: "nothing to open" },
    };
    const STATUS_ORDER = ["live", "ready", "needs-db", "needs-rework", "not-web"];
    const SYSTEM_COLORS = { "Personal": "#6ea8fe", "AnnoTag": "#4ade80", "Flecks": "#c084fc" };

    const root = document.getElementById("sections");
    let apps = [], systemsOrder = [], mode = "status", query = "";

    function sectionsFor(list) {
      if (mode === "status") {
        return STATUS_ORDER.map(k => ({
          title: STATUS[k].title, color: STATUS[k].color, hint: STATUS[k].hint,
          items: list.filter(a => a.status === k),
        }));
      }
      const sys = systemsOrder.length ? systemsOrder : [...new Set(list.map(a => a.system || "Other"))];
      return sys.map(s => {
        const items = list.filter(a => (a.system || "Other") === s);
        const owners = [...new Set(items.map(a => a.owner).filter(Boolean))];
        return { title: s, color: SYSTEM_COLORS[s] || "#8a95ab", hint: owners.join(" · "), items };
      });
    }

    function render() {
      const q = query.trim().toLowerCase();
      const visible = apps.filter(a => !q || [a.name, a.desc, a.stack, a.db, a.host, a.status, a.system, a.owner, a.profile, (a.services || []).join(" ")]
        .some(v => (v || "").toLowerCase().includes(q)));
      root.innerHTML = "";
      if (!visible.length) { root.innerHTML = `<div class="empty">No apps match “${query}”.</div>`; return; }

      for (const sec of sectionsFor(visible)) {
        if (!sec.items.length) continue;
        const wrap = document.createElement("section");
        wrap.className = "section";
        wrap.innerHTML = `
          <div class="section-head">
            <span class="dot" style="background:${sec.color}"></span>
            <h2>${sec.title}</h2>
            <span class="count">${sec.items.length}</span>
            <span class="hint">${sec.hint}</span>
          </div>
          <div class="grid"></div>`;
        const grid = wrap.querySelector(".grid");

        for (const app of sec.items) {
          const card = document.createElement("a");
          card.className = "card" + (app.live ? " live" : "");
          card.href = app.url; card.target = "_blank"; card.rel = "noopener";
          const chips = [
            app.stack  ? `<span class="chip">${app.stack}</span>` : "",
            app.db     ? `<span class="chip db">🗄 ${app.db}</span>` : "",
            app.host   ? `<span class="chip host">${app.host}</span>` : "",
            app.domain ? `<span class="chip host">${app.domain}</span>` : "",
            ...(app.services || []).map(s => `<span class="chip svc">${s}</span>`),
          ].join("");
          const label = app.live ? '<span class="live-dot"></span>Live' : (STATUS[app.status] || {}).title || app.status;
          card.innerHTML = `
            ${app.repo ? `<a class="repolink" href="${app.repo}" target="_blank" rel="noopener" title="View source">&lt;/&gt; code</a>` : ""}
            <div class="icon">${app.icon || "📦"}</div>
            <h3>${app.name}</h3>
            <p>${app.desc || ""}</p>
            <div class="chips">${chips}</div>
            ${app.note ? `<div class="note">${app.note}</div>` : ""}
            <div class="bom">
              <span><b>system</b> ${app.system || "—"}</span>
              <span><b>owner</b> ${app.owner || "—"}</span>
              <span><b>profile</b> ${app.profile || "—"}</span>
            </div>
            <div class="meta">
              <span class="badge st-${app.status}">${label}</span>
              <span class="arrow">&rarr;</span>
            </div>`;
          grid.appendChild(card);
        }
        root.appendChild(wrap);
      }
    }

    fetch("apps.json")
      .then(r => r.json())
      .then(data => {
        apps = (data.apps || []).map(a => ({ ...a, url: a.site || a.repo, live: a.status === "live" }));
        systemsOrder = data.systems || [];
        document.getElementById("totalCount").textContent = apps.length;
        document.getElementById("liveCount").textContent = apps.filter(a => a.live).length;
        render();
      })
      .catch(err => { root.innerHTML = `<div class="empty">Couldn’t load apps.json — ${err}</div>`; });

    document.getElementById("search").addEventListener("input", e => { query = e.target.value; render(); });
    document.getElementById("groupToggle").addEventListener("click", e => {
      const btn = e.target.closest("button"); if (!btn) return;
      mode = btn.dataset.mode;
      [...document.querySelectorAll("#groupToggle button")].forEach(b => b.classList.toggle("active", b === btn));
      render();
    });
  </script>
</body>
</html>
